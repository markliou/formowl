minimum_pre_commit_version: "4.0.0"
default_install_hook_types:
  - pre-commit
default_stages:
  - pre-commit
fail_fast: false

exclude: |
  (?x)^(
    \.formowl/|
    \.test-tmp/|
    .*/dist/
  )

repos:
  - repo: local
    hooks:
      - id: credential-check
        name: Credential check
        entry: python scripts/precommit_checks.py credentials
        language: system
        types: [text]

      - id: gitleaks-staged
        name: Gitleaks staged secret scan
        entry: python scripts/precommit_checks.py gitleaks-staged
        language: system
        pass_filenames: false

      - id: gitleaks-history
        name: Gitleaks full-history secret scan
        entry: python scripts/precommit_checks.py gitleaks-history
        language: system
        pass_filenames: false
        stages: [manual]

      - id: trufflehog-history
        name: TruffleHog full-history secret scan
        entry: python scripts/precommit_checks.py trufflehog-history
        language: system
        pass_filenames: false
        stages: [manual]

      - id: merge-conflict-check
        name: Merge conflict marker check
        entry: python scripts/precommit_checks.py conflicts
        language: system
        types: [text]

      - id: large-file-check
        name: Large file check
        entry: python scripts/precommit_checks.py large-files
        language: system

      - id: text-style
        name: Text style check
        entry: python scripts/precommit_checks.py text-style
        language: system
        types: [text]

      - id: python-syntax
        name: Python syntax check
        entry: python scripts/precommit_checks.py python-syntax
        language: system
        types: [python]

      - id: json-syntax
        name: JSON syntax check
        entry: python scripts/precommit_checks.py json-syntax
        language: system
        types: [json]

      - id: toml-syntax
        name: TOML syntax check
        entry: python scripts/precommit_checks.py toml-syntax
        language: system
        types: [toml]

      - id: python-ruff
        name: Python lint check
        entry: python scripts/precommit_checks.py run ruff check --no-cache python tests scripts
        language: system
        pass_filenames: false
        files: ^(python|tests|scripts)/.*\.py$

      - id: python-ruff-format
        name: Python format check
        entry: python scripts/precommit_checks.py run ruff format --no-cache --check python tests scripts
        language: system
        pass_filenames: false
        files: ^(python|tests|scripts)/.*\.py$

      - id: python-tests
        name: Python unit tests
        entry: python -m unittest discover -s tests
        language: system
        pass_filenames: false
        files: ^(python|tests)/.+\.py$
