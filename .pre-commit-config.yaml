minimum_pre_commit_version: "4.0.0"
default_install_hook_types:
  - pre-commit
default_stages:
  - pre-commit
fail_fast: false

exclude: |
  (?x)^(
    \.formowl/|
    \.test-tmp/|
    node_modules/|
    target/|
    .*/dist/|
    .*\.tsbuildinfo$
  )

repos:
  - repo: local
    hooks:
      - id: credential-check
        name: Credential check
        entry: python scripts/precommit_checks.py credentials
        language: system
        types: [text]

      - id: gitleaks-staged
        name: Gitleaks staged secret scan
        entry: python scripts/precommit_checks.py gitleaks-staged
        language: system
        pass_filenames: false

      - id: gitleaks-history
        name: Gitleaks full-history secret scan
        entry: python scripts/precommit_checks.py gitleaks-history
        language: system
        pass_filenames: false
        stages: [manual]

      - id: trufflehog-history
        name: TruffleHog full-history secret scan
        entry: python scripts/precommit_checks.py trufflehog-history
        language: system
        pass_filenames: false
        stages: [manual]

      - id: merge-conflict-check
        name: Merge conflict marker check
        entry: python scripts/precommit_checks.py conflicts
        language: system
        types: [text]

      - id: large-file-check
        name: Large file check
        entry: python scripts/precommit_checks.py large-files
        language: system

      - id: text-style
        name: Text style check
        entry: python scripts/precommit_checks.py text-style
        language: system
        types: [text]

      - id: python-syntax
        name: Python syntax check
        entry: python scripts/precommit_checks.py python-syntax
        language: system
        types: [python]

      - id: json-syntax
        name: JSON syntax check
        entry: python scripts/precommit_checks.py json-syntax
        language: system
        types: [json]

      - id: toml-syntax
        name: TOML syntax check
        entry: python scripts/precommit_checks.py toml-syntax
        language: system
        types: [toml]

      - id: python-ruff
        name: Python lint check
        entry: python scripts/precommit_checks.py run ruff check --no-cache python tests scripts
        language: system
        pass_filenames: false
        files: ^(python|tests|scripts)/.*\.py$

      - id: python-ruff-format
        name: Python format check
        entry: python scripts/precommit_checks.py run ruff format --no-cache --check python tests scripts
        language: system
        pass_filenames: false
        files: ^(python|tests|scripts)/.*\.py$

      - id: prettier-style
        name: TypeScript/JSON/YAML/Markdown style check
        entry: python scripts/precommit_checks.py run prettier --check --ignore-unknown .devcontainer .pre-commit-config.yaml compose.yaml docs examples package.json package-lock.json packages README.md tsconfig.base.json tsconfig.typecheck.json
        language: system
        pass_filenames: false
        files: ^(\.devcontainer/|\.pre-commit-config\.yaml|compose\.yaml|docs/|examples/|package\.json|package-lock\.json|packages/|README\.md|tsconfig\.base\.json|tsconfig\.typecheck\.json).*

      - id: typescript-typecheck
        name: TypeScript type check
        entry: python scripts/precommit_checks.py run npm run typecheck
        language: system
        pass_filenames: false
        files: ^(package\.json|package-lock\.json|packages/.+\.(json|ts)|tsconfig\.base\.json|tsconfig\.typecheck\.json)$

      - id: python-tests
        name: Python unit tests
        entry: python -m unittest discover -s tests
        language: system
        pass_filenames: false
        files: ^(python|tests)/.+\.py$

      - id: rust-format
        name: Rust format check
        entry: python scripts/precommit_checks.py run cargo fmt --all -- --check
        language: system
        pass_filenames: false
        files: ^(Cargo\.lock|Cargo\.toml|crates/.*)$

      - id: rust-check
        name: Rust check
        entry: python scripts/precommit_checks.py run cargo check --workspace --locked
        language: system
        pass_filenames: false
        files: ^(Cargo\.lock|Cargo\.toml|crates/.*)$

      - id: rust-clippy
        name: Rust clippy check
        entry: python scripts/precommit_checks.py run cargo clippy --workspace --all-targets --locked -- -D warnings
        language: system
        pass_filenames: false
        files: ^(Cargo\.lock|Cargo\.toml|crates/.*)$
