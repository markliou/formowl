name: Cleanup stale branches

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Delete allowlisted stale branches and this workflow
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
          WORKFLOW_PATH: .github/workflows/cleanup-stale-branches.yml
        shell: bash
        run: |
          set -euo pipefail

          branches=(
            "issue-28-ontology-v2-10000"
            "issue-5-complete-mail-phase"
            "split/issue-21-eval-research"
            "split/issue-21-mail-upload-pst-boundary"
            "split/issue-5-synthetic-mail-workflow-v2"
            "issue-5-mail-boundary-828"
            "complete-remaining-backbone-slices"
            "local-folder-ingestion-mvp"
            "kg-bert-ablation-experiment"
            "complete-slice-1"
            "closed-beta-readiness"
            "maintenance/cleanup-stale-branches-20260714"
          )

          for branch in "${branches[@]}"; do
            encoded=${branch//\//%2F}
            status=$(curl -sS -o /tmp/response.json -w '%{http_code}' \
              -X DELETE \
              -H "Authorization: Bearer ${GH_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/repos/${REPOSITORY}/git/refs/heads/${encoded}")
            case "$status" in
              204) echo "deleted ${branch}" ;;
              404) echo "already absent ${branch}" ;;
              *)
                echo "failed ${branch}: HTTP ${status}"
                cat /tmp/response.json
                exit 1
                ;;
            esac
          done

          workflow_sha=$(curl -fsSL \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${REPOSITORY}/contents/${WORKFLOW_PATH}?ref=main" \
            | python -c 'import json,sys; print(json.load(sys.stdin)["sha"])')

          curl -fsSL \
            -X DELETE \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${REPOSITORY}/contents/${WORKFLOW_PATH}" \
            -d "{\"message\":\"Remove one-shot stale branch cleanup workflow\",\"sha\":\"${workflow_sha}\",\"branch\":\"main\"}"
