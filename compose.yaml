services:
  project-mcp:
    build:
      context: .
      dockerfile: containers/runtime/Dockerfile
    command: ["python", "-m", "formowl_project_mcp"]
    environment:
      FORMOWL_DATA_DIR: /data
    volumes:
      - formowl-data:/data

  wiki-mcp:
    build:
      context: .
      dockerfile: containers/runtime/Dockerfile
    command: ["python", "-m", "formowl_wiki_mcp"]
    environment:
      FORMOWL_DATA_DIR: /data
    volumes:
      - formowl-data:/data

volumes:
  formowl-data:
